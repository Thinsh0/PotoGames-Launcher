appId: 'potogameslauncher'
productName: 'PotoGames Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

publish:
  provider: github
  owner: Thinsh0
  repo: PotoGames-Launcher

copyright: 'Copyright © 2026 PotoGames'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'
  forceCodeSigning: false

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  unicode: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target:
    - target: 'tar.gz'
      arch: 'x64'
  artifactName: '${productName}-${version}.${ext}'
  maintainer: 'PotoGames'
  vendor: 'PotoGames'
  synopsis: 'PotoGames Minecraft Launcher'
  description: 'The official launcher for PotoGames players, providing automatic access to custom modpacks and server connection.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'